<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BranchScope for Claude</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
body { display: flex; }

/* ── loading ── */
#loading {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px; z-index: 100;
  background: var(--bg-deep);
}
#loading.hidden { display: none; }
.spinner { width: 36px; height: 36px; }
#loading-text { font-size: 14px; color: var(--text-dim); }
#error-text { font-size: 14px; color: var(--rose); display: none; text-align: center; line-height: 1.7; }

/* ── left panel ── */
#panel {
  width: 272px; flex-shrink: 0; display: flex; flex-direction: column;
  background: var(--bg-panel); backdrop-filter: blur(20px);
  border-right: 1px solid var(--border); padding: 20px 16px; gap: 12px;
  overflow-y: auto; overflow-x: hidden;
}
#panel::-webkit-scrollbar { width: 4px; }
#panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.brand { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.brand-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--cyan), var(--blue));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(86,212,200,0.2);
}
.brand h1 { font-size: 17px; font-weight: 700; color: var(--text-bright); letter-spacing: -0.3px; }
.brand sub { font-size: 10px; font-weight: 400; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-top: 1px; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
.stat-card .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
.stat-card .value { font-family: var(--font-mono); font-size: 18px; font-weight: 600; }
.stat-card .value.keep { color: var(--green); }
.stat-card .value.del { color: var(--rose); }
.stat-card .value.total { color: var(--accent); }
.stat-card .value.segs { color: var(--cyan); }

.section-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; margin-top: 4px; }
.divider { border: none; border-top: 1px solid var(--border); margin: 2px 0; }

.search-row { display: flex; align-items: center; gap: 8px; }
.search-row input[type=text] { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text-bright); font-family: var(--font-display); font-size: 12px; outline: none; transition: border-color 0.15s; }
.search-row input[type=text]:focus { border-color: var(--cyan); }
.search-row input[type=text]::placeholder { color: var(--text-dim); }
.search-count { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); white-space: nowrap; }
.search-nav { display: flex; align-items: center; gap: 6px; }
.btn-nav { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim); font-size: 11px; padding: 3px 8px; cursor: pointer; font-family: var(--font-display); transition: all 0.15s; }
.btn-nav:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.search-pos { font-family: var(--font-mono); font-size: 11px; color: var(--cyan); min-width: 36px; text-align: center; }

.filter-row { display: flex; align-items: center; gap: 10px; }
.filter-row input[type=range] { flex: 1; appearance: none; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08); outline: none; }
.filter-row input[type=range]::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 8px var(--accent-glow); }
.filter-val { font-family: var(--font-mono); font-size: 14px; font-weight: 600; color: var(--accent); min-width: 28px; text-align: right; }
.filter-meta { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.filter-meta .g { color: var(--green); font-weight: 600; }
.filter-meta .r { color: var(--rose); font-weight: 600; }

.help-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 11px; color: var(--text-dim); line-height: 1.7; }
.help-box b { color: var(--text); font-weight: 600; }
.help-key { display: inline-block; font-family: var(--font-mono); font-size: 10px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 3px; padding: 0 5px; color: var(--text); }

#deleted-list { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; min-height: 48px; max-height: 160px; overflow-y: auto; font-family: var(--font-mono); font-size: 11px; white-space: pre-wrap; word-break: break-all; color: var(--text-dim); line-height: 1.6; }
#deleted-list .empty { color: var(--text-dim); font-family: var(--font-display); font-style: italic; font-size: 12px; }

.btn { display: flex; align-items: center; gap: 6px; background: var(--bg-card); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; cursor: pointer; font-family: var(--font-display); font-size: 12px; width: 100%; transition: all 0.15s ease; }
.btn:hover { background: rgba(255,255,255,0.06); border-color: var(--border-bright); }
.btn.danger { color: var(--rose); border-color: rgba(232,93,111,0.15); }
.btn.danger:hover { background: rgba(232,93,111,0.08); }
.btn-icon { font-size: 13px; opacity: 0.7; }

.legend { display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 11px; color: var(--text-dim); }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── tree area ── */
#tree-area { flex: 1; position: relative; overflow: hidden; }
#tree-area::before { content: ''; position: absolute; inset: 0; pointer-events: none; background: radial-gradient(circle at 50% 50%, transparent 40%, var(--bg-deep) 100%); z-index: 1; opacity: 0.4; }
#btn-reset-view { position: absolute; top: 12px; right: 12px; z-index: 5; background: var(--bg-panel); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font-display); font-size: 12px; padding: 6px 14px; cursor: pointer; width: auto; transition: all 0.15s ease; }
#btn-reset-view:hover { background: rgba(255,255,255,0.08); border-color: var(--border-bright); }

/* ── right reader panel ── */
#reader { width: 0; background: var(--bg-panel); backdrop-filter: blur(20px); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.3s cubic-bezier(0.4,0,0.2,1); overflow: hidden; }
#reader.open { width: 460px; }
#reader-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#reader-header h3 { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--accent); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#btn-save-log { background: rgba(74,222,128,0.08); color: var(--green); border: 1px solid rgba(74,222,128,0.2); border-radius: 5px; font-family: var(--font-display); font-size: 11px; cursor: pointer; width: auto; padding: 5px 12px; white-space: nowrap; transition: all 0.15s; }
#btn-save-log:hover { background: rgba(74,222,128,0.15); }
#reader-close { background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; width: auto; padding: 2px 6px; line-height: 1; transition: color 0.15s; }
#reader-close:hover { color: var(--text-bright); }
#reader-body { flex: 1; overflow-y: auto; padding: 18px; font-size: 13px; line-height: 1.75; }
#reader-body::-webkit-scrollbar { width: 4px; }
#reader-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.stat-card { animation: fadeIn 0.4s ease both; }
.stat-card:nth-child(2) { animation-delay: 0.05s; }
.stat-card:nth-child(3) { animation-delay: 0.1s; }
.stat-card:nth-child(4) { animation-delay: 0.15s; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="loading-text">Loading conversation...</div>
  <div id="error-text"></div>
</div>

<div id="panel" style="display:none">
  <div class="brand">
    <div class="brand-icon">&#x2442;</div>
    <div><h1>BranchScope</h1><sub>for Claude</sub></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="label">Segments</div><div class="value segs" id="s-segs">-</div></div>
    <div class="stat-card"><div class="label">Routes</div><div class="value total" id="s-total">-</div></div>
    <div class="stat-card"><div class="label">Keep</div><div class="value keep" id="s-keep">-</div></div>
    <div class="stat-card"><div class="label">Pruned</div><div class="value del" id="s-del">0</div></div>
  </div>
  <div class="divider"></div>
  <div class="section-label">Search</div>
  <div class="search-row">
    <input type="text" id="search-input" placeholder="Search conversations...">
    <span class="search-count" id="search-count"></span>
  </div>
  <div class="search-nav" id="search-nav" style="display:none">
    <button class="btn-nav" id="search-prev">&#x25B2;</button>
    <span class="search-pos" id="search-pos">0/0</span>
    <button class="btn-nav" id="search-next">&#x25BC;</button>
    <button class="btn-nav" id="search-clear">&#x2715;</button>
  </div>
  <div class="divider"></div>
  <div class="section-label">Branch Filter</div>
  <div class="filter-row">
    <input type="range" id="threshold-slider" min="0" max="50" value="0">
    <span class="filter-val" id="threshold-val">0</span>
  </div>
  <div class="filter-meta"><b class="g" id="visible-count">-</b> visible / <b class="r" id="hidden-count">0</b> hidden</div>
  <div class="divider"></div>
  <div class="help-box">
    <b>Controls</b><br>
    <span class="help-key">label</span> click &rarr; view text<br>
    <span class="help-key">node</span> click &rarr; collapse<br>
    <span class="help-key">edge</span> click &rarr; prune branch
  </div>
  <div class="divider"></div>
  <div class="section-label">Pruned Routes</div>
  <div id="deleted-list"><span class="empty">None yet</span></div>
  <button class="btn" id="btn-copy-del"><span class="btn-icon">&#x2398;</span> Copy pruned list</button>
  <button class="btn" id="btn-copy-kept"><span class="btn-icon">&#x2398;</span> Copy kept list</button>
  <button class="btn danger" id="btn-reset-all"><span class="btn-icon">&#x21BA;</span> Reset all</button>
  <div class="divider"></div>
  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#56d4c8"></span>Linear</div>
    <div class="legend-item"><span class="legend-dot" style="background:#5ba4e6"></span>2-fork</div>
    <div class="legend-item"><span class="legend-dot" style="background:#e8b931"></span>3-4</div>
    <div class="legend-item"><span class="legend-dot" style="background:#e85d6f"></span>5+</div>
    <div class="legend-item"><span class="legend-dot" style="background:#3a3a50"></span>Leaf</div>
    <div class="legend-item"><span class="legend-dot" style="background:#3a3a50;box-shadow:0 0 0 1px var(--accent)"></span>Longest</div>
  </div>
</div>

<div id="tree-area" style="display:none">
  <button id="btn-reset-view">&#x25CE; Reset view</button>
  <svg id="main-svg"></svg>
</div>

<div id="reader">
  <div id="reader-header">
    <h3 id="reader-title"></h3>
    <button id="btn-jump-branch">&#x2197; Continue here</button>
    <button id="btn-save-log">&#x2913; Save log</button>
    <button id="reader-close">&times;</button>
  </div>
  <div id="reader-body"></div>
</div>

<div id="tooltip"></div>
<div id="modal-overlay">
  <div id="modal">
    <h3>Prune branch</h3>
    <p id="modal-body"></p>
    <div class="btns">
      <button id="btn-modal-cancel">Cancel</button>
      <button id="btn-modal-confirm">Prune</button>
    </div>
  </div>
</div>

<script src="d3.v7.min.js"></script>
<script src="common.js"></script>
<script src="viewer.js"></script>
</body>
</html>
